services:
  - type: web
    name: airavat-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 8000
      - key: DATABASE_URL
        sync: false # You will paste your Neon URL in the Render dashboard
      - key: GEMINI_API_KEY
        sync: false # You will paste your Gemini API key in the Render dashboard
      - key: NASA_API_KEY
        value: "DEMO_KEY"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
